<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>资产配置 — FundLens</title>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/components.css" />
  <script src="js/sample-data.js"></script>
  <style>
    .donut-grid { display:grid;grid-template-columns:1fr 1fr 1fr;gap:var(--space-6);margin-bottom:var(--space-6); }
    @media(max-width:1024px){ .donut-grid{grid-template-columns:1fr 1fr;} }
    @media(max-width:600px){ .donut-grid{grid-template-columns:1fr;} }
    .tab-content { display: none; }
    .tab-content.is-visible { display: block; }
    .tab-btn { position: relative; }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="nav-brand" href="index.html"><span class="brand-dot"></span> FundLens</a>
  <ul class="nav-links">
    <li><a href="overview.html">首页概览</a></li>
    <li><a href="allocation.html" class="active">资产配置</a></li>
    <li><a href="profit-analysis.html">收益分析</a></li>
    <li><a href="detail-table.html">产品明细</a></li>
    <li><a href="import.html">数据导入</a></li>
    <li><a href="validation.html">数据校验</a></li>
    <li><a href="settings.html">设置</a></li>
  </ul>
</nav>

<div class="app-layout">
  <aside class="app-sidebar">
    <select class="snapshot-select"><option>2026Q1 资产快照 (2026-03-31)</option></select>
    <a href="overview.html" class="nav-item"><span class="nav-icon">&#127968;</span> 首页概览</a>
    <a href="allocation.html" class="nav-item active"><span class="nav-icon">&#128202;</span> 资产配置</a>
    <a href="profit-analysis.html" class="nav-item"><span class="nav-icon">&#128200;</span> 收益分析</a>
    <a href="detail-table.html" class="nav-item"><span class="nav-icon">&#128203;</span> 产品明细</a>
    <a href="import.html" class="nav-item"><span class="nav-icon">&#128229;</span> 数据导入</a>
    <a href="validation.html" class="nav-item"><span class="nav-icon">&#128269;</span> 数据校验</a>
    <a href="settings.html" class="nav-item"><span class="nav-icon">&#9881;</span> 设置</a>
    <div class="sidebar-footer">所有数据仅在本地处理<br>不上传至任何外部服务器</div>
  </aside>

  <main class="app-main">
    <div class="page-header">
      <h2>资产配置</h2>
      <p class="subtitle">多维度分析当前资产结构，含目标配置对比与集中度提示</p>
    </div>

    <!-- Tabs -->
    <div class="tabs" id="allocationTabs">
      <button class="tab-btn active" data-tab="overview">配置总览</button>
      <button class="tab-btn" data-tab="target">目标 vs 当前</button>
      <button class="tab-btn" data-tab="detail">详细维度</button>
    </div>

    <!-- Tab: Overview -->
    <div class="tab-content is-visible" id="tab-overview">
      <div class="donut-grid" id="donutOverview"></div>
    </div>

    <!-- Tab: Target vs Current -->
    <div class="tab-content" id="tab-target">
      <div class="chart-card" style="margin-bottom:var(--space-6);">
        <h4>当前 vs 目标配置对比 (子弹图)</h4>
        <div class="chart-container" id="chartBullet"></div>
      </div>
      <div class="card">
        <h4 style="margin-bottom:var(--space-3);">偏离详情</h4>
        <div id="deviationTable"></div>
      </div>
    </div>

    <!-- Tab: Detail dimensions -->
    <div class="tab-content" id="tab-detail">
      <div class="donut-grid" id="donutDetail"></div>
    </div>

    <!-- Concentration card -->
    <div class="chart-card" style="margin-bottom:var(--space-6);">
      <h4>单产品集中度分析</h4>
      <div class="chart-container" id="chartConcentration"></div>
    </div>

    <!-- Fee estimation -->
    <div class="chart-card">
      <h4>年化费用估算</h4>
      <div class="chart-container" id="chartFees"></div>
    </div>

  </main>
</div>

<script>
// ─── Common helpers ─────────────────────────────────────
var totalAssets = SAMPLE_DATA.reduce(function(s,r){return s+r.current_value;},0);
var donutColors = ['#c96442','#5e5d59','#d4a574','#8b9a8b','#b8a9a0','#6b7b6b','#d4c5bc','#c4b5a5'];

function donutSVG(groups, total, W, H, R, ir, cx, cy) {
  W=W||260;H=H||240;R=R||70;ir=ir||42;cx=cx||W/2-10;cy=cy||H/2;
  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  var angle=-Math.PI/2;
  groups.forEach(function(g,i){
    var slice=g.value/total;
    var a2=angle+slice*2*Math.PI;
    var x1=cx+R*Math.cos(angle),y1=cy+R*Math.sin(angle);
    var x2=cx+R*Math.cos(a2),y2=cy+R*Math.sin(a2);
    svg+='<path d="M'+cx+','+cy+' L'+x1+','+y1+' A'+R+','+R+' 0 '+(slice>0.5?1:0)+',1 '+x2+','+y2+' Z" fill="'+donutColors[i%donutColors.length]+'" opacity="0.85"/>';
    angle=a2;
  });
  svg+='<circle cx="'+cx+'" cy="'+cy+'" r="'+ir+'" fill="var(--surface)"/>';
  svg+='<text x="'+cx+'" y="'+(cy-8)+'" text-anchor="middle" font-size="18" font-weight="500" fill="var(--fg)">¥'+(total/10000).toFixed(1)+'万</text>';
  svg+='<text x="'+cx+'" y="'+(cy+14)+'" text-anchor="middle" font-size="11" fill="var(--meta)">总资产</text>';

  var legendX=W-90,legendY=16;
  groups.slice(0,6).forEach(function(g,i){
    var y=legendY+i*20;
    svg+='<rect x="'+legendX+'" y="'+y+'" width="10" height="10" rx="2" fill="'+donutColors[i%donutColors.length]+'" opacity="0.85"/>';
    svg+='<text x="'+(legendX+14)+'" y="'+(y+9)+'" font-size="10" fill="var(--fg)">'+g.name+' '+(g.value/total*100).toFixed(1)+'%</text>';
  });
  svg+='</svg>';
  return svg;
}

function makeGroups(key){
  var groups={};
  SAMPLE_DATA.forEach(function(r){var k=r[key]||'未分类';groups[k]=(groups[k]||0)+r.current_value;});
  return Object.entries(groups).map(function(e){return{name:e[0],value:e[1]};}).sort(function(a,b){return b.value-a.value;});
}

// ─── Overview tab donuts ────────────────────────────────
(function(){
  var charts=[
    {title:'平台资产分布',key:'platform'},
    {title:'资产大类分布',key:'asset_class'},
    {title:'产品类型分布',key:'product_type'},
    {title:'市场区域分布',key:'market_region'},
    {title:'资金用途分布',key:'usage_purpose'},
    {title:'风险等级分布',key:'risk_level'}
  ];
  var html='';
  charts.forEach(function(c){
    var groups=makeGroups(c.key);
    html+='<div class="chart-card"><h4>'+c.title+'</h4><div class="chart-container">'+donutSVG(groups,totalAssets)+'</div></div>';
  });
  document.getElementById('donutOverview').innerHTML=html;
})();

// ─── Detail tab donuts ──────────────────────────────────
(function(){
  var charts=[
    {title:'流动性分布',key:'liquidity'},
    {title:'平台 × 大类 交叉',key:'platform'}
  ];
  var html='';
  charts.forEach(function(c){
    var groups=makeGroups(c.key);
    html+='<div class="chart-card"><h4>'+c.title+'</h4><div class="chart-container">'+donutSVG(groups,totalAssets)+'</div></div>';
  });
  // Cross-tab: platform × asset_class
  var cross={};
  SAMPLE_DATA.forEach(function(r){var k=r.platform+' · '+r.asset_class;cross[k]=(cross[k]||0)+r.current_value;});
  var crossGroups=Object.entries(cross).map(function(e){return{name:e[0],value:e[1]};}).sort(function(a,b){return b.value-a.value;});
  html+='<div class="chart-card"><h4>平台 × 资产大类 交叉分析</h4><div class="chart-container">'+donutSVG(crossGroups,totalAssets)+'</div></div>';
  document.getElementById('donutDetail').innerHTML=html;
})();

// ─── Bullet chart (target vs current) ───────────────────
(function(){
  var targetMap={'现金类':0.10,'固收类':0.40,'固收增强类':0.10,'权益类':0.30,'跨境类':0.10};
  var byClass={};
  SAMPLE_DATA.forEach(function(r){byClass[r.asset_class]=(byClass[r.asset_class]||0)+r.current_value;});
  var order=['现金类','固收类','固收增强类','权益类','跨境类'];
  var devs=order.map(function(cls){
    var cur=(byClass[cls]||0)/totalAssets;
    var tgt=targetMap[cls]||0;
    return{cls:cls,current:cur,target:tgt,dev:cur-tgt,over:Math.abs(cur-tgt)>0.05};
  });

  var barH=36,gap=14,W=700,H=devs.length*(barH+gap)+40,padL=100,maxW=W-padL-80;
  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  svg+='<text x="'+padL+'" y="20" font-size="11" fill="var(--meta)">■ 当前占比 &nbsp; ▎目标线 &nbsp; 偏离超 ±5% 橙色高亮</text>';
  devs.forEach(function(d,i){
    var y=30+i*(barH+gap);
    svg+='<text x="'+(padL-8)+'" y="'+(y+barH/2+5)+'" text-anchor="end" font-size="12" fill="var(--fg)">'+d.cls+'</text>';
    // Track bg
    svg+='<rect x="'+padL+'" y="'+y+'" width="'+maxW+'" height="'+barH+'" fill="var(--border)" rx="3"/>';
    // Tonal range bands
    svg+='<rect x="'+padL+'" y="'+y+'" width="'+maxW+'" height="'+barH+'" fill="none" rx="3"/>';
    // Current bar
    var cw=d.current*maxW;
    var barColor=d.over?'var(--warn)':'var(--chart-1)';
    svg+='<rect x="'+padL+'" y="'+(y+4)+'" width="'+Math.max(cw,4)+'" height="'+(barH-8)+'" fill="'+barColor+'" rx="3" opacity="0.85"/>';
    // Target marker
    var mx=padL+d.target*maxW;
    svg+='<line x1="'+mx+'" y1="'+(y-2)+'" x2="'+mx+'" y2="'+(y+barH+2)+'" stroke="var(--fg)" stroke-width="2.5" stroke-dasharray="4,2"/>';
    // Labels
    svg+='<text x="'+(padL+Math.max(cw,4)+8)+'" y="'+(y+barH/2+5)+'" font-size="12" fill="'+(d.over?'var(--warn)':'var(--fg))+'">'+(d.current*100).toFixed(1)+'%</text>';
    svg+='<text x="'+(W-10)+'" y="'+(y+barH/2+5)+'" text-anchor="end" font-size="11" fill="'+(d.over?'var(--warn)':'var(--meta))+'">目标: '+(d.target*100).toFixed(0)+'% '+(d.over?'⚠':'')+'</text>';
  });
  svg+='</svg>';
  document.getElementById('chartBullet').innerHTML=svg;

  // Deviation table
  var tableHtml='<table class="data-table"><thead><tr><th>资产大类</th><th class="num">当前占比</th><th class="num">目标占比</th><th class="num">偏离</th><th>状态</th></tr></thead><tbody>';
  devs.forEach(function(d){
    var devSign=d.dev>=0?'+':'';
    tableHtml+='<tr><td>'+d.cls+'</td><td class="num">'+(d.current*100).toFixed(1)+'%</td><td class="num">'+(d.target*100).toFixed(0)+'%</td><td class="num" style="color:'+(d.over?'var(--warn)':'var(--fg))+'">'+devSign+(d.dev*100).toFixed(1)+'%</td><td>'+(d.over?'<span class="badge badge-warn">偏离超 ±5%</span>':'<span class="badge badge-success">正常</span>')+'</td></tr>';
  });
  tableHtml+='</tbody></table>';
  document.getElementById('deviationTable').innerHTML=tableHtml;
})();

// ─── Concentration chart ────────────────────────────────
(function(){
  var sorted=SAMPLE_DATA.slice().sort(function(a,b){return b.current_value-a.current_value;});
  var W=600,H=sorted.length*32+40,barH=18,gap=8,padL=130;
  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  sorted.forEach(function(r,i){
    var y=15+i*(barH+gap);
    var pct=r.current_value/totalAssets;
    var w=pct*(W-padL-70);
    var color=pct>0.2?'var(--warn)':'var(--chart-1)';
    svg+='<text x="'+(padL-6)+'" y="'+(y+barH/2+4)+'" text-anchor="end" font-size="10" fill="var(--fg)">'+r.product_name.substring(0,12)+'</text>';
    svg+='<rect x="'+padL+'" y="'+y+'" width="'+Math.max(w,2)+'" height="'+barH+'" fill="'+color+'" rx="2" opacity="0.8"/>';
    svg+='<text x="'+(padL+Math.max(w,2)+6)+'" y="'+(y+barH/2+4)+'" font-size="10" fill="'+(pct>0.2?'var(--warn)':'var(--muted))+'">'+(pct*100).toFixed(1)+'%'+(pct>0.2?' ⚠':'')+'</text>';
    // 20% threshold line
    if(i===0){svg+='<line x1="'+(padL+0.2*(W-padL-70))+'" y1="0" x2="'+(padL+0.2*(W-padL-70))+'" y2="'+(H-20)+'" stroke="var(--warn)" stroke-width="1" stroke-dasharray="4,3" opacity="0.5"/>';}
  });
  svg+='</svg>';
  document.getElementById('chartConcentration').innerHTML=svg;
})();

// ─── Fee estimation chart ───────────────────────────────
(function(){
  var W=600,H=220,barH=28,gap=12,padL=110;
  var byClass={};
  SAMPLE_DATA.forEach(function(r){var c=r.asset_class;if(!byClass[c])byClass[c]={fee:0,val:0};byClass[c].fee+=(r.annual_fee_rate||0)*r.current_value;byClass[c].val+=r.current_value;});
  var items=Object.entries(byClass).map(function(e){return{name:e[0],fee:e[1].fee,val:e[1].val};}).sort(function(a,b){return b.fee-a.fee;});
  var maxFee=Math.max.apply(null,items.map(function(i){return i.fee;}))||1;
  var totalFee=items.reduce(function(s,i){return s+i.fee;},0);
  var svg='<svg viewBox="0 0 '+W+' '+H+'" xmlns="http://www.w3.org/2000/svg">';
  items.forEach(function(item,i){
    var y=10+i*(barH+gap);
    var w=(item.fee/maxFee)*(W-padL-120);
    svg+='<text x="'+(padL-6)+'" y="'+(y+barH/2+5)+'" text-anchor="end" font-size="11" fill="var(--fg)">'+item.name+'</text>';
    svg+='<rect x="'+padL+'" y="'+y+'" width="'+Math.max(w,2)+'" height="'+barH+'" fill="var(--chart-1)" rx="3" opacity="0.8"/>';
    svg+='<text x="'+(padL+Math.max(w,2)+6)+'" y="'+(y+barH/2+5)+'" font-size="11" fill="var(--muted)">¥'+Math.round(item.fee).toLocaleString()+'/年</text>';
  });
  svg+='<text x="'+(W/2)+'" y="'+(H-4)+'" text-anchor="middle" font-size="11" fill="var(--meta)">年度管理费合计: ¥'+Math.round(totalFee).toLocaleString()+' · 占资产 '+(totalFee/totalAssets*100).toFixed(2)+'%</text>';
  svg+='</svg>';
  document.getElementById('chartFees').innerHTML=svg;
})();

// ─── Tab switching (event delegation) ────────────────────
document.getElementById('allocationTabs').addEventListener('click',function(e){
  var btn = e.target.closest('.tab-btn');
  if (!btn) return;
  e.preventDefault();
  var tabId = btn.getAttribute('data-tab');
  document.querySelectorAll('#allocationTabs .tab-btn').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');
  document.querySelectorAll('.tab-content').forEach(function(c){c.classList.remove('is-visible');});
  var target = document.getElementById('tab-'+tabId);
  if (target) target.classList.add('is-visible');
});
</script>
</body>
</html>
